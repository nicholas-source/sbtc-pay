<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Favicons — square, per-size assets composited on the app's dark bg.
         The cream+orange S logo lives at /favicon.png (source, transparent). -->
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <!-- Apple touch icon (180×180 is the modern one; older sizes derive from it) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!-- PWA manifest (icons + theme for "Add to Home Screen") -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Windows tile -->
    <meta name="msapplication-TileImage" content="/icon-192.png" />
    <meta name="msapplication-TileColor" content="#F97316" />
    <meta name="theme-color" content="#F97316" />
    <title>sBTC Pay | Get paid in sBTC</title>
    <meta name="description" content="A working payment link in 60 seconds. Invoices, subscriptions, and one-time payments are paid directly to your wallet in sBTC or STX." />

    <!-- Preconnect to font CDNs -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <!-- General Sans — body/UI (Fontshare, distinctive alternative to Inter) -->
    <link
      href="https://api.fontshare.com/v2/css?f[]=general-sans@300,400,500,600,700&display=swap"
      rel="stylesheet"
    />
    <!-- Anybody — display/headings (Google Fonts, variable width axis) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Anybody:wght@600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <meta name="author" content="sBTC Pay" />

    <!-- Open Graph (Facebook, LinkedIn, Discord, Telegram, Slack, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="sBTC Pay" />
    <meta property="og:title" content="sBTC Pay | Get paid in sBTC" />
    <meta property="og:description" content="A working payment link in 60 seconds. Invoices, subscriptions, and one-time payments are paid directly to your wallet in sBTC or STX." />
    <meta property="og:url" content="https://sbtc-pay.com" />
    <!-- 1200×630 social card. Absolute URL so every scraper resolves it. -->
    <meta property="og:image" content="https://sbtc-pay.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="sBTC Pay: get paid in sBTC. A sample payment invoice showing an on-chain payment settled to a wallet." />

    <!-- Twitter / X. Large image card backed by the 1200×630 social card. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@sBTCPay" />
    <meta name="twitter:title" content="sBTC Pay | Get paid in sBTC" />
    <meta name="twitter:description" content="A working payment link in 60 seconds. Invoices, subscriptions, and one-time payments are paid directly to your wallet in sBTC or STX." />
    <meta name="twitter:image" content="https://sbtc-pay.com/og-image.png" />
    <meta name="twitter:image:alt" content="sBTC Pay: get paid in sBTC. A sample payment invoice showing an on-chain payment settled to a wallet." />

    <!-- Structured data: site-wide Organization + WebSite entities. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://sbtc-pay.com/#organization",
            "name": "sBTC Pay",
            "url": "https://sbtc-pay.com",
            "logo": "https://sbtc-pay.com/icon-512.png",
            "sameAs": [
              "https://x.com/sbtcpay",
              "https://github.com/nicholas-source/sbtc-pay"
            ]
          },
          {
            "@type": "WebSite",
            "@id": "https://sbtc-pay.com/#website",
            "url": "https://sbtc-pay.com",
            "name": "sBTC Pay",
            "description": "A working payment link in 60 seconds. Invoices, subscriptions, and one-time payments are paid directly to your wallet in sBTC or STX.",
            "publisher": { "@id": "https://sbtc-pay.com/#organization" }
          }
        ]
      }
    </script>
  </head>

  <body class="bg-[hsl(220,16%,6%)]">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
